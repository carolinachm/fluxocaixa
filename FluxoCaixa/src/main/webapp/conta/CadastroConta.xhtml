<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">#{contaBean.editando ? 'Edição Conta' : 'Nova Conta'}</ui:define>

	<ui:define name="corpo">
		<f:metadata>
			<f:viewParam name="conta" value="{contaBean.conta}"
				converter="#{contaConverter}" />
		</f:metadata>
		<h:form>
			<h1>#{contaBean.editando ? 'Edição Conta' : 'Nova Conta'}</h1>

			<p:messages autoUpdate="true" closable="true" />

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:button value="Novo" outcome="/conta/CadastroConta" />
					<p:commandButton value="Salvar" id="botaoSalvar"
						action="#{contaBean.salvar}" />
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Pesquisa" outcome="/conta/PesquisaConta" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:panelGrid columns="2" id="painel"
				style="width: 100%; margin-top: 20px" columnClasses="rotulo, campo">
				<p:outputLabel for="conta" value="Conta:" size="30" maxlength="50" />
				<p:inputText id="conta" value="#{contaBean.conta.conta}"
					required="true" requiredMessage="O campo conta é obrigatório"
					style="text-transform:touppercase;" />

				<p:outputLabel for="agencia" value="Agencia:" size="30"
					maxlength="50" />
				<p:inputText id="agencia" value="#{contaBean.conta.agencia}"
					required="true" requiredMessage="O campo agencia é obrigatório"
					style="text-transform:touppercase;" />


				<h:outputLabel value="Tipo Conta" />
				<p:selectOneMenu value="#{contaBean.conta.tipo}">
					<f:selectItem itemLabel="Selecione" />
					<f:selectItems value="#{contaBean.tipos}" var="tipo"
						itemValue="#{tipo}" itemLabel="#{tipo.descricao}" />
				</p:selectOneMenu>

			</p:panelGrid>
		</h:form>
	</ui:define>
</ui:composition>
