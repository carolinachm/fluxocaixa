<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">#{cidadeBean.editando ? 'Edicao de Cidade' : 'Nova Cidade'}</ui:define>

	<ui:define name="corpo">
		<f:metadata>
			<f:viewParam name="cidade" value="#{cidadeBean.cidade}"
				converter="#{cidadeConverter}" />
		</f:metadata>

		<h:form>
			<h1>#{cidadeBean.editando ? 'Edicao de Cidade' : 'Nova Cidade'}</h1>

			<p:messages autoUpdate="true" closable="true" />

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:button value="Novo" outcome="/cidade/CadastroCidade" />
					<p:commandButton value="Salvar" id="botaoSalvar"
						action="#{cidadeBean.salvar}" update="@all"/>
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Pesquisa" outcome="/cidade/PesquisaCidade" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:panelGrid columns="2" id="painel"
				style="width: 100%; margin-top: 20px" columnClasses="rotulo, campo">
				<h:outputLabel value="Nome" />
				<p:inputText size="20" value="#{cidadeBean.cidade.nome}" />

				<p:outputLabel for="estado" value="Estado:" />
				<p:selectOneMenu id="estado" value="#{cidadeBean.cidade.estado}"
					converter="#{estadoConverter}">
					<f:selectItem noSelectionOption="true"
						itemLabel="Selecione um estado" />
					<f:selectItems value="#{estadoBean.estadoList}" var="estado"
						itemLabel="#{estado.nome} - #{estado.uf} " itemValue="#{estado}" />
				</p:selectOneMenu>
			</p:panelGrid>
		</h:form>
	</ui:define>
</ui:composition>
