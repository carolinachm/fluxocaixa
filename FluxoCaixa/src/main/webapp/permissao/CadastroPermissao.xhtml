<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="titulo">#{permissaoBean.editando ? 'Edição de permissao': 'Nova permissao'}</ui:define>
    
    <ui:define name="corpo">
    <f:metadata>
			<f:viewParam name="permissao" value="#{permissaoBean.permissao}"
				converter="#{permissaoConverter}" />
		</f:metadata>
    	<h:form>
	    	<h1>#{permissaoBean.editando ? 'Edição de permissao': 'Nova permissao'}</h1>
	    	
	    	<p:messages autoUpdate="true" closable="true" />
	    	
	    	<p:toolbar style="margin-top: 20px">
	    		<p:toolbarGroup>
	    			<p:button value="Novo" outcome="/permissao/CadastroPermissao" />
	    			<p:commandButton value="Salvar" id="botaoSalvar"
	    				action="#{permissaoBean.salvar}" />
	    		</p:toolbarGroup>
	    		<p:toolbarGroup align="right">
	    			<p:button value="Pesquisa" outcome="/permissao/PesquisaPermissao" />
	    		</p:toolbarGroup>
	    	</p:toolbar>
	    	
	    	<p:panelGrid columns="2" id="painel" style="width: 100%; margin-top: 20px"
	    			columnClasses="rotulo, campo">
	    		<h:outputLabel value="Descrição" for="descricao" />
				<p:inputText id="descricao" size="20" value="#{permissaoBean.permissao.descricao}"
					required="true" requiredMessage="O campo descrição e obrigatorio" />
							
	    	</p:panelGrid>
    	</h:form>
    </ui:define>
</ui:composition>
