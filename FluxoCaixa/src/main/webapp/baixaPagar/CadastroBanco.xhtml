<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">#{bancoBean.editando ? 'Edição de Banco' : 'Novo Banco'}</ui:define>


	<ui:define name="corpo">

		<f:metadata>
			<f:viewParam name="banco" value="#{bancoBean.banco}"  converter="#{bancoConverter}"/>

		</f:metadata>
		<h:form>
			 	<h1>#{bancoBean.editando ? 'Edição de banco' : 'Novo banco'}</h1>

			<p:messages autoUpdate="true" closable="true" />

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:button value="Novo" outcome="/banco/CadastroBanco" />
					<p:commandButton value="Salvar" id="botaoSalvar"
						action="#{bancoBean.salvar}" update="@all"/>
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Pesquisa" outcome="/banco/PesquisaBanco" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:panelGrid columns="2" id="painel"
				style="width: 100%; margin-top: 20px" columnClasses="rotulo, campo">
				<p:outputLabel for="nome" value="Nome:" size="30" maxlength="50" />
				<p:inputText id="nome" value="#{bancoBean.banco.nome}"
					required="true" requiredMessage="O campo nome é obrigatório"
					style="text-transform:touppercase;" />

				<p:outputLabel for="sigla" value="Sigla:" size="5" maxlength="2" />
				<p:inputText id="sigla" value="#{bancoBean.banco.sigla}"
					required="true" requiredMessage="O campo sigla é obrigatório"
					style="text-transform:uppercase;" />

				<p:outputLabel for="numero" value="Numero:" size="30" maxlength="50" />
				<p:inputText id="numero" value="#{bancoBean.banco.numero}"
					required="true" requiredMessage="O campo numero é obrigatório" />

				<p:outputLabel for="observacao" value="Observação:" size="30"
					maxlength="50" />
				<p:inputTextarea id="observacao"
					value="#{bancoBean.banco.observacao}" />

			</p:panelGrid>
		</h:form>
	</ui:define>
</ui:composition>
