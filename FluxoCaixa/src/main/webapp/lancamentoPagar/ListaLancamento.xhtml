<ui:composition 
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">


	<h:form id="listagem">
		<p:dataTable scrollable="false" style="height:200px"
			value="#{lancamentoBean.lancamentoList}" var="lancamento"
			rowIndexVar="index" emptyMessage="Nenhum produto encontrado." rows="20" paginator="true">
			<p:column width="15">
				<p:commandButton icon="ui-icon-pencil" title="Editar">
					<f:setPropertyActionListener value="#{lancamento}"
						target="#{lancamentoBean.lancamento}" />
				</p:commandButton>
			</p:column>
			<p:column width="15">
				<p:commandButton icon="ui-icon-trash" alt="Excluir"
						oncomplete="PF('confirmacao').show();" immediate="true"
						title="Excluir" process="@this" update="@form">
						<f:setPropertyActionListener value="#{lancamento}"
							target="#{fornecedorBean.lancamento}" />
					</p:commandButton>
			</p:column>
		</p:dataTable>
			<p:confirmDialog widgetVar="confirmacao"
				message="Tem certeza que deseja excluir?" header="Aviso"
				severity="alert" closable="true">

				<p:commandButton title="Sim" alt="Sim" value="Sim"
					actionListener="#{lancamentoBean.excluir}" onclick="confirmacao.hide();"
					update="@form" process="@this" />

				<p:commandButton title="Não" alt="Não" value="Não"
					onclick="confirmacao.hide();" />
			</p:confirmDialog>

	</h:form>
</ui:composition>
