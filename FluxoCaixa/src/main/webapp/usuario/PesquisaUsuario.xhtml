<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <ui:define name="titulo">Pesquisa de usuario</ui:define>
    
    <ui:define name="corpo">
    	<h:form>
	    	<h1>Pesquisa de usuário</h1>
	    	
	    	<p:toolbar style="margin-top: 20px">
	    		<p:toolbarGroup>
	    			<p:commandButton value="Pesquisar" />
	    		</p:toolbarGroup>
	    		<p:toolbarGroup align="right">
	    			<p:button value="Novo" outcome="/usuario/CadastroUsuario" />
	    		</p:toolbarGroup>
	    	</p:toolbar>
	    	
	    		    	
	    	<p:dataTable id="usuarioTable" value="#{usuarioBean.usuarioList}" var="usuario"
	    		style="margin-top: 20px" emptyMessage="Nenhum produto encontrado." rows="20"
	    		paginator="true" paginatorAlwaysVisible="false" paginatorPosition="bottom">
	    		
	    		<f:facet name="header">Usuário</f:facet>
				<p:column headerText="Código">
					<h:outputText value="#{usuario.id}" />
				</p:column>
				<p:column headerText="Nome">
					<h:outputText value="#{usuario.pessoa.nome}" />
				</p:column>
				<p:column headerText="Email">
					<h:outputText value="#{usuario.pessoa.email}" />
				</p:column>
				<p:column headerText="Ativo">
					<h:outputText value="#{usuario.ativo}" />
				</p:column>
				<p:column headerText="Permissao">
					<h:outputText value="#{usuario.permissao.descricao}" />
				</p:column>

				<p:column headerText="Ação">
					<p:button outcome="/usuario/CadastroUsuario" icon="ui-icon-pencil"
						title="Editar"
						immediate="true" process="@this" update="@form">
						<f:param name="usuario" value="#{usuario.id}" />
					</p:button>
					<p:commandButton icon="ui-icon-trash" alt="Excluir"
						oncomplete="PF('confirmacao').show();" immediate="true" title="Excluir"
						process="@this" update="@form">
						<f:setPropertyActionListener value="#{usuario}"
							target="#{usuarioBean.usuario}" />
					</p:commandButton>


				</p:column>

			</p:dataTable>

			<p:confirmDialog widgetVar="confirmacao"
				message="Tem certeza que deseja excluir?" header="Aviso"
				severity="alert" closable="true">

				<p:commandButton title="Sim" alt="Sim" value="Sim"
					actionListener="#{usuarioBean.excluir}"
					onclick="confirmacao.hide();" update="@form" process="@this" />

				<p:commandButton title="Não" alt="Não" value="Não"
					onclick="confirmacao.hide();" />
			</p:confirmDialog>
    	</h:form>
    </ui:define>
</ui:composition>
