<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">#{subSubCategoriaBean.editando ? 'Edição de SubCategoria' : 'Novo SubCategoria'}</ui:define>


	<ui:define name="corpo">

		<f:metadata>
			<f:viewParam name="subSubCategoria"
				value="#{subSubCategoriaBean.subSubCategoria}"
				converter="#{subSubCategoriaConverter}" />

		</f:metadata>
		<h:form>
			<h1>#{subSubCategoriaBean.editando ? 'Edição de SubCategoria' :
				'Novo SubCategoria'}</h1>

			
					<p:messages autoUpdate="true" closable="true" />

					<p:toolbar style="margin-top: 20px">
						<p:toolbarGroup>
							<p:button value="Novo"
								outcome="/subSubCategoria/CadastroSubCategoria" />
							<p:commandButton value="Salvar" id="botaoSalvar"
								action="#{subSubCategoriaBean.salvar}" />
						</p:toolbarGroup>
						<p:toolbarGroup align="right">
							<p:button value="Pesquisa"
								outcome="/subSubCategoria/PesquisaSubCategoria" />
						</p:toolbarGroup>
					</p:toolbar>

					<p:panelGrid columns="2" id="painel"
						style="width: 100%; margin-top: 20px"
						columnClasses="rotulo, campo">

						<p:outputLabel for="categoria" value="Categoria:" />
						<p:selectOneMenu id="categoria"
							value="#{subCategoriaBean.subCategoria.categoria}"
							converter="#{categoriaConverter}">
							<f:selectItem noSelectionOption="true"
								itemLabel="Selecione um categoria" />
							<f:selectItems value="#{subCategoriaBean.categoriaList}"
								var="categoria" itemLabel="#{categoria.descricao}"
								itemValue="#{categoria}" />
						</p:selectOneMenu>

						<p:outputLabel for="numero" value="Numero:" size="30"
							maxlength="50" />
						<p:inputText id="numero"
							value="#{subSubCategoriaBean.subSubCategoria.numero}"
							required="true" requiredMessage="O campo numero é obrigatório" />

						<p:outputLabel for="descricao" value="Descrição:" size="10"
							maxlength="50" />
						<p:inputText id="descricao"
							value="#{subSubCategoriaBean.subSubCategoria.descricao}"
							required="true" requiredMessage="O campo descricao é obrigatório"
							style="text-transform:touppercase;" />

					</p:panelGrid>
				</p:tab>
			</p:tabView>
		</h:form>
	</ui:define>
</ui:composition>
