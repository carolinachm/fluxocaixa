<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">#{estadoBean.editando ? 'Edição de estado': 'Novo estado'}</ui:define>

	<ui:define name="corpo">

		<f:metadata>
			<f:viewParam name="estado" value="#{estadoBean.estado}"
				converter="#{estadoConverter}" />
		</f:metadata>
		<h:form>
			<h1>#{estadoBean.editando ? 'Edição de estado': 'Novo estado'}</h1>

			<p:messages autoUpdate="true" closable="true" />

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:button value="Novo" outcome="/estado/CadastroEstado" />
					<p:commandButton value="Salvar" id="botaoSalvar"
						action="#{estadoBean.salvar}" />
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Pesquisa" outcome="/estado/PesquisaEstado" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:panelGrid columns="2" id="painel"
				style="width: 100%; margin-top: 20px" columnClasses="rotulo, campo">
				<h:outputLabel value="Nome" for="nome" />
				<p:inputText id="nome" size="20" value="#{estadoBean.estado.nome}"
					required="true" requiredMessage="O campo nome e obrigatorio" />

				<h:outputLabel value="UF" for="uf" />
				<p:inputText id="uf" size="10" value="#{estadoBean.estado.uf}"
					required="true" requiredMessage="O campo uf e obrigatorio" />
			</p:panelGrid>
		</h:form>
	</ui:define>
</ui:composition>
