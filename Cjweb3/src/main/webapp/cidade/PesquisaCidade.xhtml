<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">Pesquisa de Cidade</ui:define>

	<ui:define name="corpo">
		<h:form>
			<h1>Pesquisa de Cidade</h1>

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:commandButton value="Pesquisar" />
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Novo" outcome="/cidade/CadastroCidade" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:panelGrid columns="2" id="painel"
				style="width: 100%; margin-top: 20px" columnClasses="rotulo, campo">

				<p:outputLabel value="Nome" for="nome" />
				<p:inputText id="nome" size="60" />
			</p:panelGrid>

			<p:dataTable id="cidadeTable" value="#{cidadeBean.cidadeList}"
				var="cidade" style="margin-top: 20px"
				emptyMessage="Nenhum produto encontrado." rows="20" paginator="true"
				paginatorAlwaysVisible="false" paginatorPosition="bottom">
				<f:facet name="header">Cidade</f:facet>
				<p:column headerText="Código">
					<h:outputText value="#{cidade.id}" />
				</p:column>
				<p:column headerText="Nome">
					<h:outputText value="#{cidade.nome}" />
				</p:column>
				<p:column headerText="Estado">
					<h:outputText value="#{cidade.estado.nome}" />
					<h:outputText value=" - " />
					<h:outputText value="#{cidade.estado.uf}" />
				</p:column>

				<p:column headerText="Ação">



					<p:commandButton icon="ui-icon-trash" alt="Excluir"
						oncomplete="PF('confirmacao').show();" immediate="true"
						title="Excluir" process="@this" update="@form"
						action="#{cidadeBean.setCidade(cidade)}">
						<f:setPropertyActionListener value="#{cidade}"
							target="#{cidadeBean.cidade}" />
					</p:commandButton>

					<!--  <p:commandButton icon="ui-icon-pencil" title="Editar"
						update="@form" action="#{cidadeBean.setCidade(cidade)}">
						<f:setPropertyActionListener value="#{cidade}"
							target="#{cidadeBean.cidade}" />
					</p:commandButton>-->

					<p:button icon="ui-icon-pencil" title="Editar" process="@this"
						update="@form" outcome="/cidade/CadastroCidade">
						<f:param name="cidade" value="#{cidade.id}" />
					</p:button>


				</p:column>

			</p:dataTable>

			<p:confirmDialog widgetVar="confirmacao"
				message="Tem certeza que deseja excluir?" header="Aviso"
				severity="alert" closable="true">

				<p:commandButton title="Sim" alt="Sim" value="Sim"
					actionListener="#{cidadeBean.excluir}"
					onclick="confirmacao.hide();" update="@form" process="@this" />

				<p:commandButton title="Não" alt="Não" value="Não"
					onclick="confirmacao.hide();" />
			</p:confirmDialog>
		</h:form>
	</ui:define>
</ui:composition>
