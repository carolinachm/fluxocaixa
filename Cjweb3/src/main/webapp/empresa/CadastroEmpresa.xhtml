<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">#{empresaBean.editando ? 'Edição de Empresa' : 'Novo Empresa'}</ui:define>


	<ui:define name="corpo">

		<f:metadata>
			<f:viewParam name="empresa" value="#{empresaBean.empresa}"  converter="#{empresaConverter}"/>

		</f:metadata>
		<h:form>
			 	<h1>#{empresaBean.editando ? 'Edição de empresa' : 'Novo empresa'}</h1>

			<p:messages autoUpdate="true" closable="true" />

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:button value="Novo" outcome="/empresa/CadastroEmpresa" />
					<p:commandButton value="Salvar" id="botaoSalvar"
						action="#{empresaBean.salvar}" />
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Pesquisa" outcome="/empresa/PesquisaEmpresa" />
				</p:toolbarGroup>
			</p:toolbar>

			<h:panelGrid id="painel" columns="4"
				style="width: 100%; margin-top: 20px">

				<p:outputLabel for="razão" value="Razão Social" />
				<p:inputText id="razão" maxlength="50" size="30"
					value="#{empresaBean.empresa.razaoSocial}" required="true"
					requiredMessage="O campo 'razão social' é obrigatório" />

				<p:outputLabel for="cnpj" value="CNPJ" />
				<p:inputMask mask="99.999.999/9999-99" id="cnpj" maxlength="50"
					size="30" value="#{empresaBean.empresa.cnpj}" required="true"
					requiredMessage="O campo 'cnpj' é obrigatório" />

				<p:outputLabel value="Inscrição Estadual" />
				<p:inputMask mask="99.99.999" maxlength="50" size="30"
					value="#{empresaBean.empresa.inscricaoEstadual}" />

				<p:outputLabel value="Inscrição Municial" />
				<p:inputMask mask="99.99.999" maxlength="50" size="30"
					value="#{empresaBean.empresa.inscricaoMunicipal}" />

				<p:outputLabel for="dataCadastro" value="Data de Cadastro:" />
				<p:calendar id="dataCadastro"
					value="#{empresaBean.empresa.dataCadastro}" required="true"
					requiredMessage="O campo 'Data de Cadastro' é obrigatório"
					size="10" />

				<p:outputLabel for="numero" value="Telefone" />
				<p:inputMask mask="(99)9999-9999" maxlength="50" size="15"
					value="#{empresaBean.empresa.telefone.num}" required="true"
					requiredMessage="O campo prefixo é obrigatório" />
					
				<p:outputLabel for="email" value="E-mail" />
				<p:inputText id="email" maxlength="50" size="30"
					value="#{empresaBean.empresa.email}" required="true"
					requiredMessage="O campo 'email' é obrigatório">
					<f:validateRegex
						pattern="^[_A-Za-z0-9-\+]+(\.[_A-Za-z0-9-]+)*@[A-Za-z0-9-]+(\.[A-Za-z0-9]+)*(\.[A-Za-z]{2,})$" />
					</p:inputText>

				<p:outputLabel for="ativo" value="Ativo:" />
				<p:selectBooleanCheckbox id="ativo"
					value="#{empresaBean.empresa.ativo}" required="true"
					requiredMessage="O campo 'Ativo' é obrigatório" />

				<p:outputLabel value="Rua" />
				<p:inputText id="rua" maxlength="50" size="30"
					value="#{empresaBean.empresa.endereco.rua}" required="true"
					requiredMessage="O campo rua é obrigatório" />

				<p:outputLabel value="Complemento" />
				<p:inputText id="complemento" maxlength="50" size="30"
					value="#{empresaBean.empresa.endereco.complemento}"
					required="true" requiredMessage="O campo complemento é obrigatório" />

				<p:outputLabel value="Numero" />
				<p:inputText id="numero" maxlength="50" size="5"
					value="#{empresaBean.empresa.endereco.numero}"
					required="true" requiredMessage="O campo numero é obrigatório" />

				<p:outputLabel value="Bairro" />
				<p:inputText id="bairro" maxlength="50" size="30"
					value="#{empresaBean.empresa.endereco.bairro}"
					required="true" requiredMessage="O campo bairro é obrigatório" />

				<p:outputLabel value="UF" />
				<p:inputText id="uf" maxlength="50" size="5"
					value="#{empresaBean.empresa.endereco.uf}" required="true"
					requiredMessage="O campo uf é obrigatório" />

				<p:outputLabel value="CEP" />
				<p:inputMask mask="99.999-999" id="cep" maxlength="50" size="15"
					value="#{empresaBean.empresa.endereco.cep}" required="true"
					requiredMessage="O campo cep é obrigatório" />


			</h:panelGrid>
		</h:form>
	</ui:define>
</ui:composition>
