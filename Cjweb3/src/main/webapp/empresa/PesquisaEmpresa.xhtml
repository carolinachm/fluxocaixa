<ui:composition template="/WEB-INF/template/LayoutPadrao.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">

	<ui:define name="titulo">Pesquisa de Empresa</ui:define>

	<ui:define name="corpo">
		<h:form>
			<h1>Pesquisa de Empresa</h1>

			<p:toolbar style="margin-top: 20px">
				<p:toolbarGroup>
					<p:commandButton value="Pesquisar" />
				</p:toolbarGroup>
				<p:toolbarGroup align="right">
					<p:button value="Novo" outcome="/empresa/CadastroEmpresa" />
				</p:toolbarGroup>
			</p:toolbar>

			<p:panelGrid columns="2" id="painel"
				style="width: 100%; margin-top: 20px" columnClasses="rotulo, campo">

				<p:outputLabel value="Nome" for="nome" />
				<p:inputText id="nome" size="60" />
			</p:panelGrid>

			<p:dataTable id="empresaTable" value="#{empresaBean.empresaList}"
				var="empresa" style="margin-top: 20px"
				emptyMessage="Nenhum produto encontrado." rows="20" paginator="true"
				paginatorAlwaysVisible="false" paginatorPosition="bottom">
				<f:facet name="header">Empresa</f:facet>
								<p:column headerText="Codigo">
					<h:outputText value="#{empresa.id}" />
				</p:column>
				<p:column headerText="Razão Social" sortBy="#{empresa.razaoSocial}"
					filterBy="#{empresa.razaoSocial}">
					<h:outputText value="#{empresa.razaoSocial}" />
				</p:column>
				<p:column headerText="CNPJ">
					<h:outputText value="#{empresa.cnpj}" />
				</p:column>
				<p:column headerText="Email">
					<h:outputText value="#{empresa.email}" />
				</p:column>
				<p:column headerText="Telefone">
					<h:outputText value="#{empresa.telefone.num}" />
				</p:column>

				<p:column headerText="Ativo" sortBy="#{empresa.ativo}">
					<p:selectBooleanCheckbox value="#{empresa.ativo}" disabled="true" />
				</p:column>




				<p:column headerText="Ação">
					<!-- <p:commandButton icon="ui-icon-pencil" alt="Editar" title="Editar"
						immediate="true" process="@this" update="@form">
						<f:setPropertyActionListener value="#{empresa}"
							target="#{empresaBean.empresa}" />
					</p:commandButton>-->
					<p:commandButton icon="ui-icon-trash" alt="Excluir"
						oncomplete="PF('confirmacao').show();" immediate="true"
						title="Excluir" process="@this" update="@form">
						<f:setPropertyActionListener value="#{empresa}"
							target="#{empresaBean.empresa}" />
					</p:commandButton>

					<p:button outcome="/empresa/CadastroEmpresa" icon="ui-icon-pencil"
						title="Editar"
						immediate="true" process="@this" update="@form">
						<f:param name="empresa" value="#{empresa.id}" />
					</p:button>


				</p:column>
			</p:dataTable>

			<p:confirmDialog widgetVar="confirmacao"
				message="Tem certeza que deseja excluir?" header="Aviso"
				severity="alert" closable="true">

				<p:commandButton title="Sim" alt="Sim" value="Sim"
					actionListener="#{empresaBean.excluir}" onclick="confirmacao.hide();"
					update="@form" process="@this" />

				<p:commandButton title="Não" alt="Não" value="Não"
					onclick="confirmacao.hide();" />
			</p:confirmDialog>
		</h:form>
	</ui:define>
</ui:composition>
